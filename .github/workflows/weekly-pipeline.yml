name: Weekly Trending Pipeline

on:
  schedule:
    - cron: "0 14 * * 1"  # Every Monday 6am PT (14:00 UTC)
  workflow_dispatch:
    inputs:
      category:
        description: "Override category (e.g. womens-running-shoes). Leave blank to run all."
        required: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        category: [womens-running-shoes]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore GeniusLink cache
        uses: actions/cache@v4
        with:
          path: runs/${{ matrix.category }}/geniuslink_cache.json
          key: geniuslink-${{ matrix.category }}

      - name: Restore prior week ranked data
        uses: actions/cache@v4
        with:
          path: runs/${{ matrix.category }}/*/ranked.json
          key: ranked-${{ matrix.category }}-${{ github.run_id }}
          restore-keys: |
            ranked-${{ matrix.category }}-

      - name: Run weekly pipeline
        if: ${{ github.event.inputs.category == '' || github.event.inputs.category == matrix.category }}
        run: python pipeline/run.py --category ${{ matrix.category }}
        env:
          AMZ_CREATORS_ACCESS_KEY: ${{ secrets.AMZ_CREATORS_ACCESS_KEY }}
          AMZ_CREATORS_SECRET_KEY: ${{ secrets.AMZ_CREATORS_SECRET_KEY }}
          AMZ_ASSOC_TAG: ${{ secrets.AMZ_ASSOC_TAG }}
          GENIUSLINK_API_KEY: ${{ secrets.GENIUSLINK_API_KEY }}
          GENIUSLINK_API_SECRET: ${{ secrets.GENIUSLINK_API_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIRTABLE_ACCESS_TOKEN: ${{ secrets.AIRTABLE_ACCESS_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}

# Softball Daily Article Builder
# Runs at 5am PT weekdays — picks next queued article and runs full build pipeline.
# Can also be triggered manually with a specific article_id.

name: Softball Daily Build

on:
  schedule:
    # 5am PT = 12pm UTC (PDT) or 1pm UTC (PST)
    - cron: '0 12 * * 1-5'  # Weekdays at noon UTC
  workflow_dispatch:
    inputs:
      article_id:
        description: 'Article ID (e.g., fastpitch-softball-bats). Leave empty for auto-pick.'
        required: false
        type: string
      force:
        description: 'Force re-run even if artifacts exist'
        required: false
        type: boolean
        default: false

env:
  AMZ_CREATORS_ACCESS_KEY: ${{ secrets.AMZ_CREATORS_ACCESS_KEY }}
  AMZ_CREATORS_SECRET_KEY: ${{ secrets.AMZ_CREATORS_SECRET_KEY }}
  AMZ_ASSOC_TAG: ${{ secrets.AMZ_ASSOC_TAG }}
  GENIUSLINK_API_KEY: ${{ secrets.GENIUSLINK_API_KEY }}
  GENIUSLINK_API_SECRET: ${{ secrets.GENIUSLINK_API_SECRET }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  AIRTABLE_ACCESS_TOKEN: ${{ secrets.AIRTABLE_ACCESS_TOKEN }}
  AIRTABLE_SOFTBALL_BASE_ID: ${{ secrets.AIRTABLE_SOFTBALL_BASE_ID }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore GeniusLink cache
        uses: actions/cache@v4
        with:
          path: runs/softball/geniuslink_cache.json
          key: geniuslink-softball-${{ github.run_id }}
          restore-keys: |
            geniuslink-softball-

      - name: Determine article ID
        id: article
        run: |
          if [ -n "${{ inputs.article_id }}" ]; then
            echo "article_id=${{ inputs.article_id }}" >> $GITHUB_OUTPUT
          else
            # Auto-pick: use the article list from config
            # In production, this would query Airtable for the next "Queue" article
            # For now, we require an article_id via workflow_dispatch
            echo "::error::No article_id specified. Use workflow_dispatch with an article_id."
            exit 1
          fi

      - name: Run daily build
        run: |
          FORCE_FLAG=""
          if [ "${{ inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python -m softball_pipeline.run \
            --article ${{ steps.article.outputs.article_id }} \
            --type daily_build \
            $FORCE_FLAG

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: softball-run-${{ steps.article.outputs.article_id }}-${{ github.run_id }}
          path: runs/softball/${{ steps.article.outputs.article_id }}/
          retention-days: 30

# Biking Sunday Price Check
# Lightweight weekly job — checks prices on all published articles,
# updates products + regenerates widgets when price changes >10%.

name: Biking Price Check

on:
  schedule:
    # Sunday 8am PT = 3pm UTC (PDT) or 4pm UTC (PST)
    - cron: '0 15 * * 0'
  workflow_dispatch:
    inputs:
      article_id:
        description: 'Article ID to check (leave empty to check all published articles)'
        required: false
        type: string

env:
  AMZ_CREATORS_ACCESS_KEY: ${{ secrets.AMZ_CREATORS_ACCESS_KEY }}
  AMZ_CREATORS_SECRET_KEY: ${{ secrets.AMZ_CREATORS_SECRET_KEY }}
  AMZ_ASSOC_TAG: ${{ secrets.AMZ_ASSOC_TAG }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  AIRTABLE_ACCESS_TOKEN: ${{ secrets.AIRTABLE_ACCESS_TOKEN }}
  AIRTABLE_SOFTBALL_BASE_ID: ${{ secrets.AIRTABLE_SOFTBALL_BASE_ID }}

jobs:
  price-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      matrix:
        article:
          - bike-racks
          - cycling-gloves
          - cycling-shorts
          - cycling-socks
          - mountain-biking-helmets
          - mountain-biking-hydration-packs
          - mountain-biking-knee-pads
          - mountain-biking-shoes
          - mountain-biking-socks
      fail-fast: false  # Don't cancel siblings on failure

    steps:
      - name: Check if article should run
        id: should_run
        run: |
          if [ -n "${{ inputs.article_id }}" ] && [ "${{ inputs.article_id }}" != "${{ matrix.article }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.should_run.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.should_run.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        if: steps.should_run.outputs.skip != 'true'
        run: pip install -r requirements.txt

      - name: Run price check
        if: steps.should_run.outputs.skip != 'true'
        run: |
          python -m biking_pipeline.run \
            --article ${{ matrix.article }} \
            --type price_check

      - name: Upload run artifacts
        if: always() && steps.should_run.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: biking-price-check-${{ matrix.article }}-${{ github.run_id }}
          path: runs/biking/${{ matrix.article }}/
          retention-days: 14

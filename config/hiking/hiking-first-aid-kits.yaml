secondary_keywords:
  - best hiking first aid kit
  - trail first aid kit
  - backpacking first aid kit
  - compact first aid kit for hiking
  - wilderness first aid kit
  - outdoor first aid kit
target_word_count_min: 2000
target_word_count_max: 2400

# ── Google Trends ────────────────────────────────────────────────
trends_keyword: "hiking first aid kit"

# ── Editorial ────────────────────────────────────────────────────
editorial_notes: >
  Contents matter more than item count — a kit with 200 pieces of bandaids isn't better than one
  with 50 well-chosen items. Key items to call out: blister treatment (moleskin, hydrocolloid
  bandages), wound cleaning supplies, SAM splint for sprains, tweezers for ticks/splinters,
  antihistamines for allergic reactions. Weight and packability matter for day hikers. Adventure
  Medical Kits is the credibility brand used by outdoor professionals. Surviveware and Everlit
  are strong Amazon sellers. Mention that Amy should customize any pre-built kit with personal meds.


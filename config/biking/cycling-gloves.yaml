# ── Editorial ────────────────────────────────────────────────────
editorial_notes: >
  Mid-range is where most readers will land. Separate cold-weather full-finger picks from warm-weather fingerless — they're
  different purchase decisions, not just different price points. Budget unisex gloves dominate Amazon volume but won't satisfy
  Active Amy's fit needs. Lead with Pearl Izumi and Specialized as anchors, contrast against the budget options clearly. Numbness
  prevention is a real pain point for women cyclists — the BG Grail from Specialized addresses this specifically.


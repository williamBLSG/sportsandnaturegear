editorial_notes: >
  MIPS explanation is MANDATORY — lead with it, explain it simply as a slip-plane layer that reduces rotational forces in a crash.
  Virginia Tech helmet safety ratings are the credible third-party source to reference. Ponytail accommodation is a genuine women's
  differentiator — several helmets now have ponytail ports, call this out. No helmet should be recommended without MIPS at any price
  tier. OutdoorMaster Gem MIPS is the breakout Amazon brand — actually well-reviewed, not just cheap. POC and Smith are the premium
  credibility brands. Trail vs. enduro fit is an education point for beginners.


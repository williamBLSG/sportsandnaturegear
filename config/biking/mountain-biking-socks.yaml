editorial_notes: >
  MTB socks run taller (crew to knee-height) than road socks — that's the key differentiator from cycling socks. Darn Tough's
  lifetime warranty is a strong story for the durability-focused buyer. Crew height (6-8 inches) is the MTB sweet spot. Swiftwick
  and Darn Tough are the two names that keep appearing in every review source. Combine men's and women's into one guide. Low
  complexity — key differentiators are length (ankle vs. crew vs. knee) and material (merino vs. synthetic).

